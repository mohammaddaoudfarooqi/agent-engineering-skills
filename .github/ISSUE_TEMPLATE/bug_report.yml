name: Bug Report
description: Report an issue with a skill
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. The more concrete the
        details, the faster the fix. Redact any sensitive information in
        prompts or logs before submitting.

  - type: dropdown
    id: skill
    attributes:
      label: Which skill?
      options:
        - spec-driven-tdd
        - github-actions
        - doc-authoring
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: workflow
    attributes:
      label: Which workflow did the router pick?
      description: Check your skill's SKILL.md if you're not sure. Pick "Unknown" if you couldn't tell.
      options:
        - Greenfield
        - Brownfield
        - Refactor
        - Bugfix
        - Audit
        - Unknown
        - Not applicable
    validations:
      required: true

  - type: input
    id: phase
    attributes:
      label: Which phase failed?
      description: e.g., "Clarify", "Test Plan", "TDD", "Verify", "Discover", "Audit Existing", "Write"
      placeholder: e.g., Test Plan
    validations:
      required: false

  - type: textarea
    id: prompt
    attributes:
      label: Prompt or invocation
      description: Paste the prompt that triggered the issue. Redact any sensitive content.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected the skill to...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Instead, the skill...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: false

  - type: input
    id: agent
    attributes:
      label: Agent / coding assistant
      placeholder: e.g., Claude Code, Cursor, Codex, Gemini CLI, Cline, OpenCode
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: LLM model
      placeholder: e.g., Claude Opus 4.7, GPT-5, Gemini 2.5 Pro
    validations:
      required: true

  - type: input
    id: skill-version
    attributes:
      label: Skill version
      description: Commit SHA, tag, or "latest from main". Run `git rev-parse --short HEAD` in the cloned repo if unsure.
      placeholder: e.g., v0.1.0, abc1234, latest from main
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - skills.sh CLI (`npx skills add ...`)
        - Manual clone + symlink
        - Other
    validations:
      required: false

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, language, framework — anything relevant to the skill's domain.
      placeholder: |
        - OS:
        - Language / runtime:
        - Test framework / CI / docs tool (where applicable):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error output or relevant log excerpts
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else worth knowing — workarounds tried, screenshots, links.
    validations:
      required: false
