name: validate-skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate skill structure and frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Validate every skill has SKILL.md with required frontmatter
        run: |
          python <<'PY'
          import re
          import sys
          from pathlib import Path

          REQUIRED_FIELDS = {"name", "description"}
          errors: list[str] = []

          skill_dirs = sorted(p for p in Path("skills").iterdir() if p.is_dir())
          if not skill_dirs:
              errors.append("No skills/ subdirectories found")

          for skill_dir in skill_dirs:
              skill_md = skill_dir / "SKILL.md"
              if not skill_md.exists():
                  errors.append(f"{skill_dir}: missing SKILL.md")
                  continue

              text = skill_md.read_text(encoding="utf-8")
              fm_match = re.match(r"^---\s*\n(.*?)\n---\s*\n", text, re.DOTALL)
              if not fm_match:
                  errors.append(f"{skill_md}: missing YAML frontmatter")
                  continue

              fm = fm_match.group(1)
              # Top-level keys: lines starting at column 0 with `key:` and no leading space
              fields = {
                  m.group(1)
                  for m in re.finditer(r"(?m)^([A-Za-z_][A-Za-z0-9_-]*):", fm)
              }
              missing = REQUIRED_FIELDS - fields
              if missing:
                  errors.append(
                      f"{skill_md}: frontmatter missing required field(s): "
                      f"{', '.join(sorted(missing))}"
                  )

              dir_name = skill_dir.name
              name_match = re.search(r"(?m)^name:\s*(\S.*?)\s*$", fm)
              if name_match:
                  declared = name_match.group(1).strip().strip("'\"")
                  if declared != dir_name:
                      errors.append(
                          f"{skill_md}: frontmatter name '{declared}' "
                          f"does not match directory '{dir_name}'"
                      )

              if "## Workflow Router" not in text:
                  errors.append(
                      f"{skill_md}: body missing required '## Workflow Router' section"
                  )

          if errors:
              print("Skill validation failed:")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)

          print(f"Validated {len(skill_dirs)} skill(s) successfully:")
          for skill_dir in skill_dirs:
              print(f"  ok  {skill_dir.name}")
          PY

  links:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@885c65f3dc543b57c898c8099f4e08c8afd178a2 # v2.6.1
        with:
          # Scope to repo-level docs and each skill's SKILL.md. Reference
          # files under skills/*/references/ contain illustrative example
          # links in teaching content and are intentionally not checked.
          # `.lycheeignore` at the repo root is auto-loaded.
          # 408 accepted to tolerate transient third-party timeouts;
          # retries + per-request timeout absorb cold-start latency on
          # statically-hosted docs.
          args: >-
            --no-progress
            --max-concurrency 4
            --max-retries 3
            --retry-wait-time 2
            --timeout 30
            --accept 200,206,408,429
            ./*.md
            ./docs/**/*.md
            ./skills/*/SKILL.md
          fail: true
